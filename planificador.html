<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificador de Reuniones RL &middot; Cruz Roja Madrid</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--navy:#011e41;--red:#f5333f;--grey:#ededed;--dark:#323232;--brd:#58595b;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',system-ui,sans-serif;background:#f0f2f5;min-height:100vh;}
input,textarea,button,select{font-family:'Montserrat',system-ui,sans-serif;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#b0bec5;border-radius:3px;}
#app{max-width:1200px;margin:24px auto 40px;box-shadow:0 2px 20px rgba(0,0,0,.12);border-radius:12px;overflow:hidden;}
#hdr{background:var(--navy);border-bottom:3px solid var(--red);padding:12px 20px;display:flex;align-items:center;gap:12px;}
.hdr-logo{height:30px;background:#fff;border-radius:6px;padding:3px 8px;}
.hdr-title{color:#fff;font-weight:600;font-size:15px;line-height:1.2;}
.hdr-sub{font-size:10px;color:#7ea8cc;margin-top:2px;}
#main{background:#fff;padding:20px;}
/* Month nav */
#nav-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.nav-btn{background:var(--navy);color:#fff;border:none;border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:16px;font-weight:700;transition:opacity .15s;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{opacity:.8;}
#month-label{font-weight:700;font-size:16px;color:var(--navy);min-width:130px;text-align:center;}
/* Toolbar */
#toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:14px;}
.tool-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tool-label{font-size:11px;font-weight:600;color:#475569;white-space:nowrap;}
.radio-opt{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;color:var(--dark);}
.radio-opt input{cursor:pointer;accent-color:var(--navy);}
#zone-select{padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;color:var(--dark);outline:none;display:none;}
#zone-select:focus{border-color:var(--navy);}
.btn{padding:7px 13px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s;white-space:nowrap;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--red);color:#fff;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-grey{background:#e2e8f0;color:#374151;}
.btn-green{background:#16a34a;color:#fff;}
/* Legend */
#legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--dark);}
.legend-dot{width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.15);flex-shrink:0;}
.legend-title{font-size:11px;font-weight:600;color:#475569;margin-right:4px;}
/* Calendar */
#cal-wrapper{overflow-x:auto;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:16px;}
#cal{border-collapse:collapse;min-width:100%;font-size:11px;}
#cal .hdr-row th{background:var(--navy);color:#fff;font-weight:600;font-size:10px;padding:7px 4px;text-align:center;border:1px solid rgba(255,255,255,.15);white-space:nowrap;position:sticky;top:0;z-index:2;}
#cal .hdr-row th:first-child{min-width:52px;background:var(--navy);z-index:3;}
#cal td{border:1px solid #e2e8f0;padding:0;vertical-align:top;}
#cal .time-cell{background:#f8fafc;color:#64748b;font-weight:500;font-size:10px;text-align:center;padding:3px 4px;white-space:nowrap;min-width:52px;border-right:2px solid #cbd5e1;}
#cal .lunch-row td{background:#f1f5f9;color:#94a3b8;font-size:10px;font-style:italic;text-align:center;padding:4px;height:22px;border:1px solid #e2e8f0;}
.day-cell{width:90px;min-width:70px;height:36px;cursor:pointer;transition:background .1s;position:relative;padding:3px 4px;}
.day-cell:hover{filter:brightness(.93);}
.day-cell.selected{outline:2px solid var(--red);outline-offset:-2px;z-index:1;}
.day-cell.state-empty{background:#fff;}
.day-cell.state-libre{background:#f0fdf4;}
.day-cell.state-nocitar{background:#f3f4f6;}
.day-cell.state-visita{}
.cell-text{font-size:10px;line-height:1.3;font-weight:500;}
.cell-text.t-libre{color:#16a34a;}
.cell-text.t-nocitar{color:var(--red);}
.cell-text.t-visita{color:#1e293b;}
.cell-sub{font-size:9px;color:#475569;font-weight:400;}
/* Action buttons */
#actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
/* Summary */
#summary-bar{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;}
#summary-toggle{width:100%;background:#f8fafc;border:none;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
#summary-body{display:none;padding:14px;background:#fff;}
#summary-body.open{display:block;}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:12px;}
.sum-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;}
.sum-card-val{font-size:22px;font-weight:700;color:var(--navy);}
.sum-card-lbl{font-size:10px;color:#64748b;margin-top:2px;}
.sum-list{font-size:12px;color:var(--dark);line-height:1.8;}
.sum-list .missing{color:var(--red);font-weight:500;}
/* RL Banner */
#rl-banner{background:#0369a1;color:#fff;padding:10px 20px;font-size:12px;font-weight:600;display:none;align-items:center;gap:10px;flex-wrap:wrap;}
#rl-banner.show{display:flex;}
#rl-form{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px;margin-bottom:14px;display:none;}
#rl-form.show{display:block;}
#rl-form h3{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:10px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-end;}
.form-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;}
.form-field label{font-size:11px;font-weight:600;color:#475569;}
.form-field input,.form-field select{padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none;}
.form-field input:focus,.form-field select:focus{border-color:var(--navy);}
#reservation-result{background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:12px;font-size:12px;display:none;margin-top:10px;}
/* @media print */
@media print{
  #toolbar,#actions,#summary-bar,#nav-bar,#legend,#rl-form,#rl-banner{display:none!important;}
  body{background:#fff;}
  #app{box-shadow:none;border-radius:0;margin:0;max-width:100%;}
  #cal-wrapper{border:none;overflow:visible;}
  #cal{font-size:9px;}
  #main{padding:8px;}
}
@media(max-width:900px){
  #cal-wrapper{overflow-x:scroll;}
}
</style>
</head>

  <span>&#128065; MODO LECTURA &mdash; Selecciona un hueco &quot;Libre&quot; y rellena tus datos para reservar</span>

<div id="main">

  <!-- Month Nav -->
  <div id="nav-bar">
    <button class="nav-btn" onclick="prevMonth()" title="Mes anterior">&#8249;</button>
    <div id="month-label"></div>
    <button class="nav-btn" onclick="nextMonth()" title="Mes siguiente">&#8250;</button>
    <span id="autosave-badge" style="font-size:10px;color:#94a3b8;margin-left:6px;"></span>
  </div>

  <!-- Tool panel (hidden in RL mode) -->
  <div id="toolbar">
    <div class="tool-group">
      <span class="tool-label">Estado:</span>
      <label class="radio-opt"><input type="radio" name="st" value="empty" checked> Vac&iacute;o</label>
      <label class="radio-opt"><input type="radio" name="st" value="libre"> Libre</label>
      <label class="radio-opt"><input type="radio" name="st" value="nocitar"> No citar</label>
      <label class="radio-opt"><input type="radio" name="st" value="visita"> Visita</label>
    </div>
    <select id="zone-select">
      <option value="">-- Elige zona --</option>
    </select>
    <div class="tool-group">
      <label class="radio-opt" style="font-size:11px;gap:5px;">
        <input type="checkbox" id="chk-cal" style="accent-color:var(--navy);"> Calendarizada
      </label>
    </div>
    <button class="btn btn-grey" onclick="clearSelected()">&#128465; Limpiar</button>
    <button class="btn btn-grey" onclick="clearAll()">&#128465; Limpiar todo</button>
  </div>

  <!-- Legend -->
  <div id="legend">
    <span class="legend-title">Zonas RL:</span>
  </div>

  <!-- RL Booking Form -->
  <div id="rl-form">
    <h3>&#128205; Reservar hueco</h3>
    <div class="form-row">
      <div class="form-field">
        <label>Tu nombre completo</label>
        <input type="text" id="rl-name" placeholder="Nombre Apellido">
      </div>
      <div class="form-field">
        <label>Tu zona RL</label>
        <select id="rl-zone-select"><option value="">-- Selecciona --</option></select>
      </div>
      <div class="form-field">
        <label>Hueco seleccionado</label>
        <select id="rl-slot-select"><option value="">-- Selecciona un hueco libre --</option></select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="doReserve()">&#10003; Reservar</button>
    <div id="reservation-result">
      <strong>&#127881; Reserva realizada</strong><br>
      <span id="reservation-text"></span><br><br>
      <button class="btn btn-grey" onclick="copyReservation()">&#128203; Copiar reserva</button>
    </div>
  </div>

  <!-- Calendar -->
  <div id="cal-wrapper">
    <table id="cal"></table>
  </div>

  <!-- Action buttons (hidden in RL mode) -->

const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// ─── Init ───
function init(){
  const now=new Date();
  curYear=now.getFullYear();
  curMonth=now.getMonth(); // 0-indexed
  loadFromStorage();
  buildLegend();
  buildZoneSelects();
  detectRLMode();
  if(!rlMode){
    renderCalendar();
    setInterval(autoSave,5000);
    setInterval(()=>{document.getElementById("autosave-badge").textContent="";} ,6000);
  }
}

// ─── RL Mode detection ───
function detectRLMode(){
  if(location.hash.startsWith("#data=")){
    rlMode=true;
    try{
      const encoded=location.hash.slice(6);
      const json=decodeURIComponent(atob(encoded));
      const parsed=JSON.parse(json);
      calData=parsed.data||{};
      curYear=parsed.year||curYear;
      curMonth=parsed.month||curMonth;
    } catch(e){console.error("RL decode error",e);}
    document.getElementById("rl-banner").classList.add("show");
    document.getElementById("toolbar").style.display="none";
    document.getElementById("actions").style.display="none";
    document.getElementById("rl-form").classList.add("show");
    populateRLSlots();
    renderCalendar();
  } else {
    renderCalendar();
  }
}

// ─── Month navigation ───
function prevMonth(){
  curMonth--;
  if(curMonth<0){curMonth=11;curYear--;}
  renderCalendar();
}
function nextMonth(){
  curMonth++;
  if(curMonth>11){curMonth=0;curYear++;}
  renderCalendar();
}

// ─── Working days ───
function getWorkingDays(year,month){
  const days=[];
  const d=new Date(year,month,1);
  while(d.getMonth()===month){
    const dow=d.getDay();
    if(dow>=1&&dow<=5) days.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return days;
}

function padZ(n){return String(n).padStart(2,"0");}
function cellKey(date,slot){
  return `${date.getFullYear()}-${padZ(date.getMonth()+1)}-${padZ(date.getDate())}_${slot}`;
}
function parseCellKey(key){
  const [datePart,slot]=key.split("_");
  const [y,m,d]=datePart.split("-").map(Number);
  return {date:new Date(y,m-1,d),slot};
}

// ─── Render Calendar ───
function renderCalendar(){
  document.getElementById("month-label").textContent=`${MONTHS[curMonth]} ${curYear}`;
  const days=getWorkingDays(curYear,curMonth);
  const tbl=document.getElementById("cal");
  tbl.innerHTML="";

  // Header row
  const thead=document.createElement("thead");
  const headerRow=document.createElement("tr");
  headerRow.className="hdr-row";
  const thTime=document.createElement("th");
  thTime.textContent="Hora";
  headerRow.appendChild(thTime);
  days.forEach(d=>{
    const th=document.createElement("th");
    const dow=DAYS_SHORT[d.getDay()];
    th.textContent=`${dow}-${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`;
    th.title=`${d.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"})}`;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  tbl.appendChild(thead);

  // Body rows
  const tbody=document.createElement("tbody");

  SLOTS.forEach((slot,si)=>{
    if(slot===null){
      // Lunch break row
      const tr=document.createElement("tr");
      tr.className="lunch-row";
      const td=document.createElement("td");
      td.colSpan=days.length+1;
      td.textContent="— Pausa para comer (13:00 – 14:00) —";
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }
    const tr=document.createElement("tr");
    const tdTime=document.createElement("td");
    tdTime.className="time-cell";
    tdTime.textContent=slot;
    tr.appendChild(tdTime);
    days.forEach(d=>{
      const key=cellKey(d,slot);
      const td=document.createElement("td");
      td.className="day-cell";
      td.dataset.key=key;
      td.dataset.date=`${d.getFullYear()}-${padZ(d.getMonth()+1)}-${padZ(d.getDate())}`;
      td.dataset.slot=slot;
      applyCellDisplay(td,calData[key]);
      if(selCells.has(key)) td.classList.add("selected");
      if(rlMode){
        const s=calData[key];
        if(s&&s.state==="libre"){
          td.style.cursor="pointer";
          td.onclick=()=>selectRLSlot(key,d,slot);
        } else {
          td.style.cursor="default";
        }
      } else {
        td.addEventListener("mousedown",e=>startDrag(e,key,tr));
        td.addEventListener("mouseover",e=>extendDrag(e,key));
        td.addEventListener("click",e=>handleClick(e,key));
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  tbl.appendChild(tbody);
  updateSummary();
}

function applyCellDisplay(td,state){
  // Remove old state classes
  td.classList.remove("state-empty","state-libre","state-nocitar","state-visita");
  td.style.background="";
  td.innerHTML="";
  if(!state||state.state==="empty"){
    td.classList.add("state-empty");
    return;
  }
  if(state.state==="libre"){
    td.classList.add("state-libre");
    const span=document.createElement("span");
    span.className="cell-text t-libre";
    span.textContent="Libre";
    td.appendChild(span);
    return;
  }
  if(state.state==="nocitar"){
    td.classList.add("state-nocitar");
    const span=document.createElement("span");
    span.className="cell-text t-nocitar";
    span.textContent="No citar";
    td.appendChild(span);
    return;
  }
  if(state.state==="visita"){
    td.classList.add("state-visita");
    const zone=ZONES.find(z=>z.name===state.zone)||{color:"#ccc",text:"#000"};
    td.style.background=zone.color;
    const span=document.createElement("span");
    span.className="cell-text t-visita";
    span.style.color=zone.text;
    span.textContent=`Visita ${state.zone}`;
    td.appendChild(span);
    if(state.calendarizada){
      const sub=document.createElement("div");
      sub.className="cell-sub";
      sub.style.color=zone.text;
      sub.style.opacity="0.8";
      sub.textContent="✓ Calendarizada";
      td.appendChild(sub);
    }
    td.title=`Visita ${state.zone}${state.calendarizada?" (Calendarizada)":""}`;
    return;
  }
}

// ─── Cell Selection ───
function startDrag(e,key,tr){
  if(e.button!==0) return;
  isDragging=true;
  dragStart=key;
  if(!e.shiftKey){
    selCells.clear();
  }
  selCells.add(key);
  highlightSelected();
  e.preventDefault();
}
function extendDrag(e,key){
  if(!isDragging) return;
  // Add cell to selection
  selCells.add(key);
  highlightSelected();
}
function handleClick(e,key){
  if(!e.shiftKey){
    selCells.clear();
    selCells.add(key);
  } else {
    selCells.add(key);
  }
  highlightSelected();
  applyCurrentState();
}
document.addEventListener("mouseup",()=>{
  if(isDragging){
    isDragging=false;
    applyCurrentState();
  }
});
function highlightSelected(){
  document.querySelectorAll(".day-cell").forEach(td=>{
    if(selCells.has(td.dataset.key)) td.classList.add("selected");
    else td.classList.remove("selected");
  });
}
function applyCurrentState(){
  const stateRadio=document.querySelector('input[name="st"]:checked');
  if(!stateRadio) return;
  const st=stateRadio.value;
  const zone=document.getElementById("zone-select").value;
  const cal=document.getElementById("chk-cal").checked;
  selCells.forEach(key=>{
    if(st==="empty"){
      delete calData[key];
    } else if(st==="visita"){
      if(!zone) return;
      calData[key]={state:"visita",zone:zone,calendarizada:cal};
    } else {
      calData[key]={state:st};
    }
    const td=document.querySelector(`.day-cell[data-key="${key}"]`);
    if(td) applyCellDisplay(td,calData[key]);
  });
  autoSave();
  updateSummary();
}
function clearSelected(){
  selCells.forEach(key=>{
    delete calData[key];
    const td=document.querySelector(`.day-cell[data-key="${key}"]`);
    if(td) applyCellDisplay(td,null);
  });
  selCells.clear();
  highlightSelected();
  autoSave();
  updateSummary();
}
function clearAll(){
  if(!confirm("¿Limpiar todos los datos del mes actual?")) return;
  // Clear only current month keys
  const prefix=`${curYear}-${padZ(curMonth+1)}-`;
  Object.keys(calData).forEach(k=>{if(k.startsWith(prefix)) delete calData[k];});
  selCells.clear();
  renderCalendar();
  autoSave();
}

// ─── Radio change handler ───
document.querySelectorAll('input[name="st"]').forEach(r=>{
  r.addEventListener("change",()=>{
    document.getElementById("zone-select").style.display=
      r.value==="visita"?"inline-block":"none";
  });
});

// ─── Build legend & zone selects ───
function buildLegend(){
  const lg=document.getElementById("legend");
  ZONES.forEach(z=>{
    const item=document.createElement("div");
    item.className="legend-item";
    const dot=document.createElement("div");
    dot.className="legend-dot";
    dot.style.background=z.color;
    item.appendChild(dot);
    item.appendChild(document.createTextNode(z.name));
    lg.appendChild(item);
  });
}
function buildZoneSelects(){
  const sel=document.getElementById("zone-select");
  const rlSel=document.getElementById("rl-zone-select");
  ZONES.forEach(z=>{
    const o=document.createElement("option");
    o.value=z.name;o.textContent=z.name;
    sel.appendChild(o);
    const o2=document.createElement("option");
    o2.value=z.name;o2.textContent=z.name;
    rlSel.appendChild(o2);
  });
}

// ─── Storage ───
function autoSave(){
  saveToStorage();
  document.getElementById("autosave-badge").textContent="✓ Guardado";
}
function saveToStorage(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({data:calData}));
  } catch(e){}
}
function loadFromStorage(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const p=JSON.parse(raw);
      calData=p.data||{};
    }
  } catch(e){}
}

// ─── RL Link ───
function generateRLLink(){
  const payload={year:curYear,month:curMonth,data:calData};
  const encoded=btoa(encodeURIComponent(JSON.stringify(payload)));
  generatedLink=location.href.split("#")[0]+"#data="+encoded;
  document.getElementById("copy-link-btn").style.display="inline-flex";
  alert("Enlace generado. Haz clic en 'Copiar enlace' para copiarlo al portapapeles.");
}
function copyLink(){
  if(!generatedLink) return;
  navigator.clipboard.writeText(generatedLink).then(()=>alert("Enlace copiado al portapapeles."));
}

// ─── RL Mode ───
function populateRLSlots(){
  const sel=document.getElementById("rl-slot-select");
  sel.innerHTML='<option value="">-- Selecciona un hueco libre --</option>';
  const days=getWorkingDays(curYear,curMonth);
  days.forEach(d=>{
    SLOTS.forEach(slot=>{
      if(!slot) return;
      const key=cellKey(d,slot);
      const s=calData[key];
      if(s&&s.state==="libre"){
        const o=document.createElement("option");
        o.value=key;
        const dayStr=d.toLocaleDateString("es-ES",{weekday:"short",day:"numeric",month:"short"});
        o.textContent=`${dayStr} ${slot}`;
        sel.appendChild(o);
      }
    });
  });
}
function selectRLSlot(key,d,slot){
  document.getElementById("rl-slot-select").value=key;
}
function doReserve(){
  const name=document.getElementById("rl-name").value.trim();
  const zone=document.getElementById("rl-zone-select").value;
  const slotKey=document.getElementById("rl-slot-select").value;
  if(!name){alert("Por favor, introduce tu nombre.");return;}
  if(!zone){alert("Por favor, selecciona tu zona.");return;}
  if(!slotKey){alert("Por favor, selecciona un hueco libre.");return;}
  const {date,slot}=parseCellKey(slotKey);
  const dateStr=date.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const text=`Reunión reservada: ${dateStr} ${slot} — ${name} — ${zone}`;
  document.getElementById("reservation-text").textContent=text;
  document.getElementById("reservation-result").style.display="block";
  document.getElementById("reservation-result")._text=text;
}
function copyReservation(){
  const t=document.getElementById("reservation-result")._text||"";
  navigator.clipboard.writeText(t).then(()=>alert("Reserva copiada al portapapeles."));
}

// ─── Summary ───
function toggleSummary(){
  const body=document.getElementById("summary-body");
  const arrow=document.getElementById("summary-arrow");
  body.classList.toggle("open");
  arrow.textContent=body.classList.contains("open")?"▲":"▼";
  if(body.classList.contains("open")) updateSummary();
}
function updateSummary(){
  const prefix=`${curYear}-${padZ(curMonth+1)}-`;
  let totalVisitas=0,libres=0;
  const visitedZones=new Set();
  const visitDetails=[];
  const days=getWorkingDays(curYear,curMonth);

  days.forEach(d=>{
    SLOTS.forEach(slot=>{
      if(!slot) return;
      const key=cellKey(d,slot);
      const s=calData[key];
      if(!s) return;
      if(s.state==="libre") libres++;
      if(s.state==="visita"){
        if(s.calendarizada){
          totalVisitas++;
          visitedZones.add(s.zone);
          const dayStr=`${DAYS_SHORT[d.getDay()]} ${padZ(d.getDate())}/${padZ(d.getMonth()+1)}`;
          visitDetails.push(`${dayStr} ${slot} — Visita ${s.zone}${s.calendarizada?" ✓":""} `);
        }
      }
    });
  });

  const pendingZones=ZONES.map(z=>z.name).filter(n=>!visitedZones.has(n));

  document.getElementById("sum-grid").innerHTML=`
    <div class="sum-card"><div class="sum-card-val">${totalVisitas}</div><div class="sum-card-lbl">Visitas calendarizadas</div></div>
    <div class="sum-card"><div class="sum-card-val">${visitedZones.size}/${ZONES.length}</div><div class="sum-card-lbl">Zonas visitadas</div></div>
    <div class="sum-card"><div class="sum-card-val">${libres}</div><div class="sum-card-lbl">Huecos libres</div></div>
    <div class="sum-card"><div class="sum-card-val">${pendingZones.length}</div><div class="sum-card-lbl">Zonas pendientes</div></div>
  `;
  let listHtml="";
  if(pendingZones.length>0){
    listHtml+=`<div style="margin-bottom:8px;"><strong style="color:var(--red);">⚠ Zonas sin visita asignada:</strong><br>`;
    listHtml+=pendingZones.map(z=>`<span class="missing">• ${z}</span>`).join("  ");
    listHtml+="</div>";
  } else {
    listHtml+='<div style="color:#16a34a;font-weight:600;margin-bottom:8px;">✓ Todas las zonas tienen visita asignada</div>';
  }
  if(visitDetails.length>0){
    listHtml+="<strong>Detalle de visitas calendarizadas:</strong><br>"+visitDetails.join("<br>");
  }
  document.getElementById("sum-list").innerHTML=listHtml;
}

// ─── Export Image ───
function exportImage(){
  const el=document.getElementById("cal-wrapper");
  html2canvas(el,{scale:2,backgroundColor:"#fff"}).then(canvas=>{
    const a=document.createElement("a");
    a.download=`planificador_RL_${MONTHS[curMonth]}_${curYear}.png`;
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}

// ─── Copy text summary ───
function copyTextSummary(){
  const days=getWorkingDays(curYear,curMonth);
  let lines=[`PLANIFICACIÓN DE REUNIONES RL — ${MONTHS[curMonth].toUpperCase()} ${curYear}`,"=".repeat(50)];
  days.forEach(d=>{
    SLOTS.forEach(slot=>{
      if(!slot) return;
      const key=cellKey(d,slot);
      const s=calData[key];
      if(!s||s.state==="empty") return;
      const dayStr=`${DAYS_SHORT[d.getDay()]} ${padZ(d.getDate())}/${padZ(d.getMonth()+1)}`;
      if(s.state==="libre") lines.push(`${dayStr} ${slot} — Libre`);
      else if(s.state==="nocitar") lines.push(`${dayStr} ${slot} — No citar`);
      else if(s.state==="visita") lines.push(`${dayStr} ${slot} — Visita ${s.zone}${s.calendarizada?" (Calendarizada)":""}`);
    });
  });
  navigator.clipboard.writeText(lines.join("\n")).then(()=>alert("Resumen copiado al portapapeles."));
}

// ─── Email ───
function sendEmail(){
  const h=new Date().getHours();
  const greeting=h<14?"Buenos días":"Buenas tardes";
  const days=getWorkingDays(curYear,curMonth);
  let lines=[];
  days.forEach(d=>{
    SLOTS.forEach(slot=>{
      if(!slot) return;
      const key=cellKey(d,slot);
      const s=calData[key];
      if(s&&s.state==="visita"&&s.calendarizada){
        const dayStr=`${DAYS_SHORT[d.getDay()]} ${padZ(d.getDate())}/${padZ(d.getMonth()+1)}`;
        lines.push(`${dayStr} ${slot} — Visita ${s.zone}`);
      }
    });
  });
  const resumen=lines.length>0?lines.join("\n"):"(Sin visitas calendarizadas aún)";
  const subj=`Planificación Reuniones RL — ${MONTHS[curMonth]} ${curYear}`;
  const body=`${greeting},\n\nAdjunto la planificación de reuniones con los Responsables Locales para el mes de ${MONTHS[curMonth]} ${curYear}.\n\n${resumen}\n\nQuedo a vuestra disposición para cualquier duda o aclaración.\n\nUn saludo,\nDavid Martin Requena\nRT Gestión Técnica`;
  location.href=`mailto:?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
}

// ─── Start ───
init();
</script>
